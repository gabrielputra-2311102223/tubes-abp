<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ngebut.in</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-content">
                <a href="index.html" class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">NGEBUT<span>.in</span></span>
                </a>
                <h2>Gabung Sekarang! 🏍️</h2>
                <p>Buat akun gratis dan mulai sewa motor impianmu hari ini juga.</p>
                <div class="auth-features">
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-tag"></i></span>
                        <span>Harga spesial untuk member baru</span>
                    </div>
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-clock"></i></span>
                        <span>Proses booking kurang dari 2 menit</span>
                    </div>
                    <div class="auth-feature">
                        <span class="feature-icon"><i class="fas fa-star"></i></span>
                        <span>Poin rewards setiap transaksi</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-box">
                <h3>Daftar Akun</h3>
                <p class="auth-subtitle">Isi data diri kamu dengan lengkap</p>
                
                <div id="registerError" class="error-message"></div>
                
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="nama@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter">
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                </div>
                
                <button class="btn btn-primary" style="width: 100%;" onclick="register()">
                    <i class="fas fa-user-plus"></i> Daftar Sekarang
                </button>
                
                <p class="auth-footer">
                    Sudah punya akun? <a href="login.html">Login disini</a>
                </p>
            </div>
        </div>
    </div>

    <script src="assets/js/storage.js"></script>
    <script>
        function register() {
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();
            const errorEl = document.getElementById('registerError');

            errorEl.innerText = '';

            if (!nama || !email || !password || !confirm) {
                errorEl.innerText = 'Semua field wajib diisi';
                return;
            }

            if (password.length < 6) {
                errorEl.innerText = 'Password minimal 6 karakter';
                return;
            }

            if (password !== confirm) {
                errorEl.innerText = 'Password dan konfirmasi tidak cocok';
                return;
            }

            // --- MULAI KODE BARU UNTUK MENGHUBUNGI BACKEND PYTHON ---
            
            // 1. Siapkan data yang mau dikirim
            const dataUserBaru = {
                nama: nama,
                email: email,
                password: password
            };

            // 2. Kirim data ke API menggunakan fetch()
            fetch('http://127.0.0.1:5000/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dataUserBaru)
            })
            .then(response => response.json())
            .then(data => {
                // 3. Cek jawaban dari server
                if (data.status === 'sukses') {
                    alert('✅ ' + data.pesan + ' Silakan login.');
                    window.location.href = 'login.html'; // Pindah ke halaman login
                } else {
                    // Jika gagal (misal email sudah ada)
                    errorEl.innerText = data.pesan; 
                }
            })
            .catch(error => {
                errorEl.innerText = 'Gagal terhubung ke server backend.';
                console.error('Error:', error);
            });
            // --- AKHIR KODE BARU ---
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
