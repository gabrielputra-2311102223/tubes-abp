<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Kendaraan - Ngebut.in Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">NGEBUT<span>.in</span></span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <a href="kendaraan.html" class="nav-item active"><i class="fas fa-motorcycle"></i> Kelola Motor</a>
            <a href="booking.html" class="nav-item"><i class="fas fa-calendar-check"></i> Pesanan Masuk</a>
            <a href="#" onclick="logout()" class="nav-item" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="content-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1>Kelola Kendaraan</h1>
                <p>Tambah atau edit armada motor yang tersedia.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fas fa-plus"></i> Tambah Motor
            </button>
        </header>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Gambar</th>
                        <th>Nama Motor</th>
                        <th>Harga/Hari</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="motorTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="motorModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Tambah Armada Baru</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nama Motor</label>
                    <input type="text" id="mNama" placeholder="Contoh: Yamaha XMAX">
                </div>
                <div class="form-group">
                    <label>Harga Sewa (Rp)</label>
                    <input type="number" id="mHarga" placeholder="Contoh: 150000">
                </div>
                <div class="form-group">
                    <label>Deskripsi Singkat</label>
                    <input type="text" id="mDesc" placeholder="Contoh: Motor kencang dan nyaman">
                </div>
                <div class="form-group">
                    <label>URL Gambar (Opsional)</label>
                    <input type="text" id="mGambar" placeholder="Link foto motor">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" onclick="simpanMotor()">Simpan ke Database</button>
            </div>
        </div>
    </div>

    <script>
        function fetchMotors() {
            fetch('http://127.0.0.1:5000/api/motors')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('motorTableBody');
                tbody.innerHTML = data.map(m => `
                    <tr>
                        <td><img src="${m.gambar}" style="width:60px; border-radius:8px;" onerror="this.src='https://placehold.co/100'"></td>
                        <td><strong>${m.nama}</strong></td>
                        <td>Rp ${m.harga.toLocaleString()}</td>
                        <td><span class="badge badge-${m.status}">${m.status.toUpperCase()}</span></td>
                    </tr>
                `).join('');
            });
        }

        function openModal() { document.getElementById('motorModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('motorModal').style.display = 'none'; }

        function simpanMotor() {
            const payload = {
                nama: document.getElementById('mNama').value,
                harga: document.getElementById('mHarga').value,
                desc: document.getElementById('mDesc').value,
                gambar: document.getElementById('mGambar').value || 'assets/img/motor-default.jpg'
            };

            fetch('http://127.0.0.1:5000/api/admin/motors', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                alert(data.pesan);
                closeModal();
                fetchMotors();
            });
        }

        window.onload = fetchMotors;
    </script>
</body>
</html>
