<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Booking - Ngebut.in</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dashboard-layout">
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo" style="margin-bottom: 1rem;">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">NGEBUT<span>.in</span></span>
            </a>
            <div class="user-profile" id="userProfile"></div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="booking.html" class="nav-item">
                <i class="fas fa-calendar-alt"></i> Booking Saya
            </a>
            <a href="riwayat.html" class="nav-item active">
                <i class="fas fa-history"></i> Riwayat
            </a>
            <a href="#" class="nav-item logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-title">
                <h1>Riwayat Booking</h1>
                <p>Daftar transaksi yang sudah selesai</p>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Motor</th>
                        <th>Tanggal Sewa</th>
                        <th>Tanggal Kembali</th>
                        <th>Total</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="riwayatList">
                    <tr><td colspan="5" style="text-align: center; padding: 2rem;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/storage.js"></script>
    <script src="../assets/js/script.js"></script>
    <script>
    const user = getCurrentUser();
    if (!user) window.location.href = '../login.html';

    document.getElementById('userProfile').innerHTML = `
        <div class="user-avatar">${user.nama.charAt(0).toUpperCase()}</div>
        <div class="user-info">
            <h4>${user.nama}</h4>
            <p><i class="fas fa-user"></i> Member</p>
        </div>
    `;

    function renderRiwayat() {
        // ✔ pastikan status auto update dulu
        syncAutoDone();

        // ✔ ambil data terbaru setelah update
        const allBookings = getBooking();

        const bookings = allBookings.filter(b => 
            b.userId === user.id && 
            ['done', 'cancelled'].includes(b.status)
        );
        
        const tbody = document.getElementById('riwayatList');
        
        if (bookings.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 3rem; color: var(--gray-500);">
                <i class="fas fa-history" style="font-size: 3rem; opacity: 0.3; margin-bottom: 1rem;"></i>
                <h3>Belum ada riwayat booking</h3>
            </td></tr>`;
            return;
        }

        tbody.innerHTML = bookings
            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
            .map(b => `
                <tr>
                    <td><strong>${b.motorName}</strong></td>
                    <td>${formatShortDate(b.startDate)}</td>
                    <td>${formatShortDate(b.endDate)}</td>
                    <td>${formatRupiah(b.totalHarga)}</td>
                    <td>${getStatusBadge(b.status)}</td>
                </tr>
            `).join('');
    }

    renderRiwayat();
    setInterval(renderRiwayat, 10000);
</script>
